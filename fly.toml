# fly.toml — https://fly.io/docs/reference/configuration/
# Run `fly launch` to create the app, then `fly deploy` to ship.

app = "dotb-game"
primary_region = "lax"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # WebSocket connections need longer timeouts
  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
